                            <!-- Left Column: Slides -->
                            <div class="bg-white rounded-xl p-8 shadow-sm border border-gray-100 h-full flex flex-col">
                                <h3 class="text-xl font-bold text-blue-700 mb-4 border-b pb-2"><i class="fa-solid fa-person-chalkboard mr-2"></i>Key Slide Concepts</h3>
                                <ul class="flex-1">${slidesHTML}</ul>
                                ${pdfHTML}
                            </div>

                            <!-- Right Column: Textbooks & Videos -->
                            <div class="space-y-8">
                                <div class="bg-white rounded-xl p-8 shadow-sm border border-gray-100">
                                    <h3 class="text-xl font-bold text-green-700 mb-4 border-b pb-2"><i class="fa-solid fa-bookmark mr-2"></i>Textbook Readings</h3>
                                    ${textbookHTML}
                                    <p class="text-xs text-gray-400 mt-2"><i class="fa-solid fa-circle-info"></i> Direct links to OpenStax Biology for AP® Courses Chapters 2 & 3.</p>
                                </div>

                                <div class="bg-white rounded-xl p-8 shadow-sm border border-gray-100">
                                    <h3 class="text-xl font-bold text-blue-700 mb-4 border-b pb-2"><i class="fa-solid fa-video mr-2"></i>Associated Videos</h3>
                                    ${videosHTML}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function toggleTopicComplete(id) {
            if(state.progress.topicsCompleted.includes(id)) {
                state.progress.topicsCompleted = state.progress.topicsCompleted.filter(t => t !== id);
            } else {
                state.progress.topicsCompleted.push(id);
            }
            saveProgress();
            renderView(id);
        }

        // Flashcards Logic
        function renderFlashcardUI() {
            const main = document.getElementById('main-content');
            const flashcards = questions; 
            const card = flashcards[state.currentFlashcardIndex];
            const isFav = state.progress.favorites.includes(state.currentFlashcardIndex);

            main.innerHTML = `
                <div class="max-w-3xl mx-auto h-full flex flex-col justify-center items-center pt-10">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Concept Flashcards</h2>
                    <p class="text-gray-500 mb-8">Card ${state.currentFlashcardIndex + 1} of ${flashcards.length}</p>

                    <div class="relative w-full max-w-2xl h-80 flashcard perspective" id="flashcard" onclick="this.classList.toggle('flipped')">
                        <div class="flashcard-inner">
                            <div class="flashcard-front flex flex-col">
                                <span class="text-sm font-semibold text-blue-500 uppercase tracking-widest mb-4">Question</span>
                                <h3 class="text-2xl font-bold text-gray-800 px-6">${card.q}</h3>
                                <p class="text-gray-400 text-sm mt-auto"><i class="fa-solid fa-hand-pointer"></i> Click to flip</p>
                            </div>
                            <div class="flashcard-back flex flex-col">
                                <span class="text-sm font-semibold text-blue-200 uppercase tracking-widest mb-4 mt-6">Answer</span>
                                <h3 class="text-xl md:text-2xl font-bold text-white px-6 pb-6">${card.options[card.ans]}</h3>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-between items-center w-full max-w-2xl mt-10">
                        <button onclick="changeFlashcard(-1)" class="px-6 py-3 bg-white border border-gray-200 rounded-lg shadow-sm hover:bg-gray-50 disabled:opacity-50"><i class="fa-solid fa-arrow-left"></i> Prev</button>

                        <button onclick="toggleFavorite(${state.currentFlashcardIndex})" class="px-6 py-3 rounded-full text-2xl transition hover:scale-110 ${isFav ? 'text-red-500' : 'text-gray-300'}">
                            <i class="fa-solid fa-heart"></i>
                        </button>

                        <button onclick="changeFlashcard(1)" class="px-6 py-3 bg-blue-600 text-white rounded-lg shadow-sm hover:bg-blue-700 disabled:opacity-50">Next <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </div>
            `;
        }

        function changeFlashcard(dir) {
            const newIndex = state.currentFlashcardIndex + dir;
            if(newIndex >= 0 && newIndex < questions.length) {
                state.currentFlashcardIndex = newIndex;
                renderFlashcardUI();
            }
        }

        function toggleFavorite(index) {
            if(state.progress.favorites.includes(index)) {
                state.progress.favorites = state.progress.favorites.filter(i => i !== index);
            } else {
                state.progress.favorites.push(index);
            }
            saveProgress();
            renderFlashcardUI();
        }

        // Quiz Logic
        let quizState = { questions: [], currentIndex: 0, score: 0, answers: [] };

        function renderQuizSetup() {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="max-w-2xl mx-auto pt-20 text-center">
                    <div class="bg-blue-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="fa-solid fa-list-check text-4xl text-blue-600"></i>
                    </div>
                    <h2 class="text-3xl font-bold text-gray-800 mb-4">Unit 1 Assessment</h2>
                    <p class="text-gray-600 mb-8 text-lg">Test your knowledge of the Chemistry of Life with a comprehensive multiple-choice quiz. The bank contains ${questions.length} questions.</p>

                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm mb-8 text-left">
                        <h4 class="font-bold text-gray-800 mb-2">Quiz Settings</h4>
                        <label class="block text-sm text-gray-600 mb-1">Number of questions:</label>
                        <select id="quiz-length" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500">
                            <option value="10">Quick Check (10 questions)</option>
                            <option value="25">Standard (25 questions)</option>
                            <option value="50">Comprehensive (50 questions)</option>
                            <option value="${questions.length}">Full Bank (${questions.length} questions)</option>
                        </select>
                    </div>

                    <button onclick="startQuiz()" class="w-full py-4 bg-blue-600 text-white text-lg font-bold rounded-xl shadow-lg hover:bg-blue-700 transition">Start Quiz Now</button>
                </div>
            `;
        }

        function startQuiz() {
            const length = parseInt(document.getElementById('quiz-length').value);
            let shuffled = [...questions].sort(() => 0.5 - Math.random());
            quizState.questions = shuffled.slice(0, length);
            quizState.currentIndex = 0;
            quizState.score = 0;
            quizState.answers = new Array(length).fill(null);
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            const main = document.getElementById('main-content');
            if(quizState.currentIndex >= quizState.questions.length) {
                finishQuiz();
                return;
            }

            const q = quizState.questions[quizState.currentIndex];
            const progress = ((quizState.currentIndex) / quizState.questions.length) * 100;

            let optionsHTML = q.options.map((opt, idx) => `
                <button onclick="selectQuizAnswer(${idx})" class="w-full text-left p-4 mb-3 rounded-lg border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 transition text-lg">
                    <span class="inline-block w-8 h-8 bg-gray-100 text-gray-600 rounded-full text-center leading-8 font-bold mr-3">${String.fromCharCode(65 + idx)}</span>
                    ${opt}
                </button>
            `).join('');

            main.innerHTML = `
                <div class="max-w-3xl mx-auto pt-10">
                    <div class="flex justify-between text-sm text-gray-500 mb-2 font-bold uppercase tracking-wider">
                        <span>Question ${quizState.currentIndex + 1} of ${quizState.questions.length}</span>
                        <span>Progress: ${Math.round(progress)}%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2 mb-8">
                        <div class="bg-blue-600 h-2 rounded-full transition-all" style="width: ${progress}%"></div>
                    </div>

                    <h3 class="text-2xl font-bold text-gray-800 mb-8">${q.q}</h3>

                    <div class="options">
                        ${optionsHTML}
                    </div>
                </div>
            `;
        }

        function selectQuizAnswer(index) {
            quizState.answers[quizState.currentIndex] = index;
            if(index === quizState.questions[quizState.currentIndex].ans) {
                quizState.score++;
            }
            quizState.currentIndex++;
            renderQuizQuestion();
        }

        function finishQuiz() {
            const main = document.getElementById('main-content');
            const pct = Math.round((quizState.score / quizState.questions.length) * 100);

            // Save Score
            state.progress.quizScores.push(pct);
            saveProgress();

            main.innerHTML = `
                <div class="max-w-2xl mx-auto pt-20 text-center">
                    <div class="w-32 h-32 rounded-full flex items-center justify-center mx-auto mb-6 ${pct >= 70 ? 'bg-green-100 text-green-600' : 'bg-yellow-100 text-yellow-600'}">
                        <i class="fa-solid ${pct >= 70 ? 'fa-trophy' : 'fa-star'} text-6xl"></i>
                    </div>
                    <h2 class="text-4xl font-bold text-gray-800 mb-4">Quiz Complete!</h2>
                    <p class="text-2xl text-gray-600 mb-2">You scored <span class="font-bold ${pct >= 70 ? 'text-green-600' : 'text-yellow-600'}">${pct}%</span></p>
                    <p class="text-gray-500 mb-8">${quizState.score} correct out of ${quizState.questions.length} questions.</p>

                    <div class="flex space-x-4 justify-center">
                        <button onclick="navigate('dashboard')" class="px-8 py-3 bg-gray-100 text-gray-700 font-bold rounded-lg hover:bg-gray-200 transition">Back to Dashboard</button>
                        <button onclick="renderQuizSetup()" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition">Try Again</button>
                    </div>
                </div>
            `;
        }

        // Boot
        initApp();
    </script>
</body>
</html>
